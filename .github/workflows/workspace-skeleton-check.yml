# @/.github/workflows/workspace-skeleton-check.yml - 防止模板骨架文件被意外删除或遗漏
# - ../../README.md

name: Workspace Skeleton Check # 工作流名称

on: # 触发条件
  push: # 推送时触发
    branches: # 目标分支
      - main # 主分支
  pull_request: # PR时触发

jobs: # 任务列表
  workspace-skeleton: # 工作区骨架检查
    name: Workspace skeleton # 任务名称
    runs-on: ubuntu-latest # 运行环境

    steps: # 执行步骤
      - name: Checkout repository # 拉取仓库
        uses: actions/checkout@v4 # 官方 checkout action

      - name: Check workspace skeleton files # 检查工作区骨架文件
        shell: bash # 使用 Bash
        run: | # 脚本内容
          required_files=(
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            "CLAUDE.md"
            ".editorconfig"
            ".gitattributes"
            ".gitignore"
            "DOCUMENTS/TechStack.md"
            "DOCUMENTS/Commands.md"
            ".docs/wanto/README.md"
            ".docs/design/README.md"
            ".docs/plan/README.md"
            ".docs/history/README.md"
            ".docs/references/README.md"
            ".docs/trashcan/README.md"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Required file is missing"
              missing=1
            fi
          done

          exit "$missing"
